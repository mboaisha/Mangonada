---

## Install and setup mangowm

type: dnf
repos:
  files:
    add:
      - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
  keys:
    - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
  cleanup: true
install:
  skip-unavailable: false
  packages:
    - terra-release
    - terra-release-extras
    - mangowm
