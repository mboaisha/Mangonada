---

# "Common" packages
modules:
  - type: dnf
    install:
      packages:
        - fastfetch
        - foot
        - wl-clipboard
        - firefox
        - grim
        - slurp
# Move files to image
  - type: files
    files:
      - source: system/etc
        destination: /etc
      - source: system/usr
        destination: /usr
