---

# Install and setup DankMaterialShell
modules:
  - type: dnf
    repos:
      copr:
        enable:
          - avengemedia/dms-git
          - avengemedia/danklinux
    install:
      skip-unavailable: false
      packages:
        - dms
        - dms-greeter
        - greetd
  - type: files
    files:
      - source: system/etc/greetd
        destination: /etc/greetd
  - type: systemd
    system:
      enabled:
        - greetd.service
      disabled:
        - gdm.service
