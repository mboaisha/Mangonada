---

# Install and enable the ly TUI display manager
modules:
  - type: dnf
    repos:
      copr:
        enable:
          - u2fsdgvkx1/ly
    install:
      skip-unavailable: false
      packages:
        - ly
        - brightnessctl
  # Re-overlay /etc/pam.d/ly AFTER the ly package install above. The base
  # module's blanket files overlay runs before any package installs, so the
  # ly package would otherwise clobber our PAM file (which adds the
  # mangonada-seed-home pam_exec hook needed to seed /etc/skel into $HOME).
  - type: files
    files:
      - source: system/etc/pam.d/ly
        destination: /etc/pam.d/ly
  - type: systemd
    system:
      enabled:
        # ly ships a template unit; instantiate on tty1 (the TTY gdm used to own).
        # `Conflicts=getty@%i.service` in ly@.service displaces the default getty.
        - ly@tty1.service
      disabled:
        - gdm.service
