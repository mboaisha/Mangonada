---

# Install Noctalia shell from Terra.
# Terra ships a customized quickshell fork (`noctalia-qs`) specifically for
# Noctalia; it Provides: quickshell and gets pulled in automatically as a dep
# of noctalia-shell. Do NOT add `quickshell` here — it conflicts with
# noctalia-qs. Terra is enabled earlier via mangonada-mangowm.yml.
modules:
  - type: dnf
    install:
      skip-unavailable: false
      packages:
        - noctalia-shell
        - cliphist
